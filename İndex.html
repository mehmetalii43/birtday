<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>İyi Ki Doğdun Meyus</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:black;
    color:white;
    height:100vh;
    overflow:hidden;

    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;

    font-family:Arial,sans-serif;
}

h1{
    font-size:4rem;
    text-align:center;
    margin-bottom:40px;
}

button{
    position:absolute;
    padding:15px 35px;
    border:none;
    border-radius:12px;
    font-size:1.2rem;
    cursor:pointer;
}

#foto{
    display:none;
    max-width:80%;
    max-height:70vh;
    border-radius:20px;
    animation:gel 1s ease;
}

@keyframes gel{
    from{
        opacity:0;
        transform:scale(0.7);
    }
    to{
        opacity:1;
        transform:scale(1);
    }
}
</style>
</head>
<body>
<h1>İyi Ki Doğdun Meyus ❤️</h1>

<button id="btn">Buraya Aban</button>

<img id="foto" src="meyus.jpg">

<script>
const btn = document.getElementById("btn");
const foto = document.getElementById("foto");

let tiklama = 0;

btn.addEventListener("click", () => {

    tiklama++;

    if(tiklama < 4){

        const x = Math.random() * (window.innerWidth - 200);
        const y = Math.random() * (window.innerHeight - 100);

        btn.style.left = x + "px";
        btn.style.top = y + "px";
    }
    else{

        btn.style.display = "none";

        document.querySelector("h1").style.display = "none";

        foto.style.display = "block";
    }
});
</script>

</body>
</html>
